<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vula Admin</title>
    <link rel="icon" type="image/svg+xml" href="https://vulacareers.co.za/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#6d5efc",
              brand2: "#14b8d4",
              lime: "#b6f400",
              navy: "#0b1020",
              deepnavy: "#070b1a",
              muted: "#9aa3c0",
            },
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              heading: ["Sora", "Inter", "sans-serif"],

          },
        },
      };
    </script>
    <style>
      * { font-family: "Inter", sans-serif; }
      h1, h2, h3, .font-heading { font-family: "Sora", sans-serif; letter-spacing: -0.02em; }
      body { background: #f5f6fa; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: #d4d8e4; border-radius: 8px; }

  <body>
